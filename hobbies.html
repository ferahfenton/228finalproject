<!DOCTYPE html>
<html lang="EN-CA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barriecito&family=Grandstander:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <title>Ferah's Brain</title>
    <style>
    body {
      margin: 0 auto;
      padding: 0;
      background-image: url("brain.jpg");
      background-size: 100%;
      background-position: center;
      max-width: 1200px;
    }

    .hero {
      min-height: 800px;
      text-align: center;
      padding: 40px;
      padding-top: 150px;
    }

    h1 {
      font-family: "Barriecito", system-ui;
      font-weight: 400;
      font-style: normal;
      font-size: 3.5em;
      color: #4d0000;
      margin-bottom: 10px;
      }
    
    h2{
      font-family: "Grandstander", cursive;
      font-optical-sizing: auto;
      font-weight: 250;
      font-style: normal;
      font-size: 2em;
      line-height: 1.5em;
      color: #660000;
      }

    p {
      font-family: "Grandstander", cursive;
      font-optical-sizing: auto;
      font-weight: 600;
      font-style: normal;
      font-size: 1.3em;
      color: #660000;
      }

    .buttons {
      margin: 30px auto;
      width: 600px;
      }

    .buttons a {
      text-decoration: none;
      padding: 14px 36px;
      border: 2px solid #4d0000;
      color: #4d0000;
      font-family: "Grandstander", cursive;
      font-optical-sizing: auto;
      font-weight: 600;
      font-style: normal;
      font-size: 1.1em;
      border-radius: 4px;
      margin-right: 20px;
      }

    .buttons a:last-child {
      margin-right: 0;
      }

    .buttons a:hover {
      background-color: #4d0000;
      color: #bd6867;
      }
      
  </style>
</head>
<body>
   <div class="wrapper">

    <div class="hero">
      <h1>WARNING:</h1>
        
      <h2>These <b>hobbies </b> occupy an unreasonable amount of brain space</h2> 
    
      <p>so please check em out!</p>
      
      <div class="buttons">
        <a href="#photos">photos</a>
        <a href="#design">graphic design</a>
        <a href="#visual">visual arts</a>
      </div>
    </div>

    <div id="photos">
      <h2>photos</h2>
    </div>

    <div id="design">
      <h2>graphic design</h2>
    </div>

    <div id="visual">
      <h2>visual arts</h2>
    </div>

  </div>

</body>
</html>
