<!DOCTYPE html>
<html lang="EN-CA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barriecito&family=Grandstander:ital,wght@0,100..900;1,100..900&family=Rock+3D&display=swap" rel="stylesheet">
  <title>Ferah's Memories</title>
  <style>
    body {
      margin: 0 auto;
      padding: 0;
      background-image: url("brain2.jpg");
      background-size: cover;
      background-position: center;
      max-width: 1200px;
      position: relative;
    }

    .hero {
      min-height: 400px;
      text-align: center;
      padding: 40px;
      padding-top: 150px;
    }

    h1 {
      font-family: "Rock 3D", system-ui;
      font-weight: 600;
      font-size: 4em;
      color: #4d0000;
      margin-bottom: 10px;
    }

    h2 {
      font-family: "Grandstander", cursive;
      font-weight: 250;
      font-size: 1.8em;
      line-height: 1.3em;
      color: #660000;
    }

    h3 {
      font-family: "Grandstander", cursive;
      font-weight: 500;
      font-size: 1em;
      line-height: 1.5em;
      color: #660000;
      padding-top: 20px;
    }

    p {
      font-family: "Grandstander", cursive;
      font-weight: 600;
      font-size: 1.3em;
      color: #660000;
      padding-top: 20px;
    }

    .back {
      position: absolute;
      top: 20px;
      left: 20px;
      text-decoration: none;
      color: #4d0000;
      font-family: "Grandstander", cursive;
      font-weight: 600;
      font-size: 1em;
      padding: 5px 6px;
      border: 2px solid #4d0000;
      border-radius: 20px;
      background-color: #a04746;
    }

    .back:hover {
      text-decoration: underline;
    }

    .grid {
      display: grid;
      grid-template-columns: 50% 50%;
      gap: 20px;
      padding: 20px 40px 40px 40px;
    }

    .memory-box {
      background-color: rgba(77, 0, 0, 0.95);
      border-radius: 20px;
      text-align: center;
      min-height: 200px;
      border: 2px solid #4d0000;
    }

    .memory-box > label {
      display: block;
      padding: 60px 40px;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }

    .memory-box h2 {
      font-family: "Rock 3D", system-ui;
      font-weight: 700;
      font-size: 2em;
      color: #a04746;
      margin: 0;
    }

    .memory-box:hover {
      background-color: rgba(255, 200, 190, 0.9);
      border: 2px solid #ffc8be;
    }

    input[type="checkbox"] {
      display: none;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(77, 0, 0, 0.95);
      overflow-y: scroll;
      z-index: 10;
      box-sizing: border-box;
    }

    input:checked ~ .overlay {
      display: block;
    }

    .overlay-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px;
    }

    .close {
      display: block;
      text-align: left;
      font-size: 1em;
      color: #a04746;
      font-family: "Grandstander", cursive;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .close:hover {
      text-decoration: underline;
    }

    .overlay h2 {
      color: #f5ede3;
      font-size: 3em;
      margin: 0;
      padding: 0;
      line-height: normal;
    }

    .overlay p {
      color: #f5ede3;
      font-weight: 400;
      line-height: 1.8em;
      padding-top: 0;
    }
  </style>
</head>
<body>
  <a href="welcome.html" class="back">← back</a>

  <div class="hero">
    <h2>Take a trip down Ferah's</h2>
    <h1>memory lane...</h1>
    <br>
    <p>click a box to explore ↓</p>
  </div>

  <div class="grid">

    <div class="memory-box">
      <input type="checkbox" id="childhood">
      <label for="childhood">
        <h2>CHILDHOOD ERA</h2>
      </label>
      <div class="overlay">
        <div class="overlay-inner">
          <label for="childhood" class="close">✕ close</label>
          <h2>CHILDHOOD ERA</h2>
          <p>your content here</p>
        </div>
      </div>
    </div>

    <div class="memory-box">
      <input type="checkbox" id="uni">
      <label for="uni">
        <h2>UNIVERSITY LIFE</h2>
      </label>
      <div class="overlay">
        <div class="overlay-inner">
          <label for="uni" class="close">✕ close</label>
          <h2>UNIVERSITY LIFE</h2>
          <p>your content here</p>
        </div>
      </div>
    </div>

    <div class="memory-box">
      <input type="checkbox" id="likes">
      <label for="likes">
        <h2>LIKES &amp; DISLIKES</h2>
      </label>
      <div class="overlay">
        <div class="overlay-inner">
          <label for="likes" class="close">✕ close</label>
          <h2>LIKES &amp; DISLIKES</h2>
          <p>your content here</p>
        </div>
      </div>
    </div>

    <div class="memory-box">
      <input type="checkbox" id="currently">
      <label for="currently">
        <h2>CURRENTLY...</h2>
      </label>
      <div class="overlay">
        <div class="overlay-inner">
          <label for="currently" class="close">✕ close</label>
          <h2>CURRENTLY...</h2>
          <p>your content here</p>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
